apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: harbor.chunha.ddns.net:9443/private/demo-app:latest
        ports:
        - containerPort: 3000
      imagePullSecrets:
      - name: harbor-private
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-service
spec:
  type: LoadBalancer
  selector:
    app: demo-app  # This must match the labels in your Deployment template
  ports:
    - protocol: TCP
      port: 3000        # The port exposed by the LoadBalancer
      targetPort: 3000  # The port the container is listening on
