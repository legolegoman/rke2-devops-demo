apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: ghcr.io/<your-username>/<your-repo>/demo-app:latest
        ports:
        - containerPort: 3000
      imagePullSecrets:
      - name: ghcr-creds